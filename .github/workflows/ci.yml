name: CI

on:
  push:
    branches: [master, "001-*", "00[2-9]-*", "0[1-9][0-9]-*"]
  pull_request:
    branches: [master]

env:
  NODE_VERSION: "20"

jobs:
  # -----------------------------------------------------------------------
  # 1. Lint & Type Check
  # -----------------------------------------------------------------------
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check
        env:
          SKIP_ENV_VALIDATION: "true"

  # -----------------------------------------------------------------------
  # 2. Unit Tests
  # -----------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm test:coverage
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # -----------------------------------------------------------------------
  # 3. Build
  # -----------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: "true"

  # -----------------------------------------------------------------------
  # 4. E2E Tests (Playwright)
  # -----------------------------------------------------------------------
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    if: false  # Skip Phase 1 (no E2E tests yet)
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: credai
          POSTGRES_PASSWORD: ci_test_secret
          POSTGRES_DB: credai_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run database migrations
        run: pnpm prisma:migrate:deploy
        env:
          DATABASE_URL: "postgresql://credai:ci_test_secret@localhost:5432/credai_test"

      - name: Run E2E tests
        run: pnpm test:e2e --project=chromium
        env:
          DATABASE_URL: "postgresql://credai:ci_test_secret@localhost:5432/credai_test"
          NEXTAUTH_SECRET: "ci-test-secret-32-characters-long"
          NEXTAUTH_URL: "http://localhost:3000"
          SKIP_ENV_VALIDATION: "false"
          GST_PROVIDER: "mock"
          PAN_PROVIDER: "mock"
          EMAIL_PROVIDER: "console"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # -----------------------------------------------------------------------
  # 5. Lighthouse CI (accessibility ≥90 gate)
  # -----------------------------------------------------------------------
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: build
    if: false  # Skip Phase 1 (no real pages yet)
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Lighthouse CI
        run: |
          pnpm exec lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          SKIP_ENV_VALIDATION: "true"
